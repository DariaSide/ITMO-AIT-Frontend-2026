<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task | Prime</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/dashboard.css">
    <link rel="stylesheet" href="../../css/light.css" id="theme-style">
</head>

<body class="dashboard-page">
    <div class="d-flex">
        <aside class="sidebar p-3">
            <nav aria-label="Sidebar navigation">
                <h2 class="logo text-white mb-4">
                    <a href="dashboard.html" class="text-white text-decoration-none" aria-label="Prime dashboard homepage">
                        PRIME
                    </a>
                </h2>

                <ul class="nav flex-column">
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white" href="dashboard.html">
                            <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-dashboard"></use></svg>
                            Dashboard
                        </a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white" href="add_task.html" aria-current="page">
                            <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-task"></use></svg>
                            Create new task
                        </a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white" href="create_project.html">
                            <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-project"></use></svg>
                            Create new project
                        </a>
                    </li>
                    <li class="nav-item mt-4">
                        <a class="nav-link text-white" href="../default.html">
                            <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-logout"></use></svg>
                            Logout
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main id="main-content" class="main-content flex-grow-1 p-4">
            <div class="d-flex justify-content-end mb-3">
                <button id="theme-toggle" class="btn btn-outline-secondary" type="button">
                    <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-theme"></use></svg>
                    Theme
                </button>
            </div>

            <section aria-labelledby="create-task-title">
                <h1 id="create-task-title" class="mb-4">
                    <svg class="icon icon-lg nav-icon"><use href="/prime/images/sprite.svg#icon-task"></use></svg>
                    Create Task
                </h1>

                <form class="card p-4" aria-label="Create task form">
                    <div class="mb-3">
                        <label for="taskTitle" class="form-label">Task title</label>
                        <input id="taskTitle" name="taskTitle" class="form-control" type="text" required autocomplete="off">
                    </div>

                    <div class="mb-3">
                        <label for="taskDescription" class="form-label">Task description</label>
                        <textarea id="taskDescription" name="taskDescription" class="form-control" rows="4"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="taskProject" class="form-label">Select project</label>
                        <select id="taskProject" name="taskProject" class="form-select" required></select>
                    </div>

                    <div class="mb-3">
                        <label for="taskAssignee" class="form-label">Assign to</label>
                        <select id="taskAssignee" name="taskAssignee" class="form-select" required></select>
                    </div>

                    <div class="mb-3">
                        <label for="taskStatus" class="form-label">Status</label>
                        <select id="taskStatus" name="taskStatus" class="form-select" required>
                            <option value="To Do">To Do</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Done">Done</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="taskDue" class="form-label">Deadline</label>
                        <input id="taskDue" name="taskDue" class="form-control" type="date" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button id="createTaskBtn" class="btn btn-dark" type="button">
                            <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-plus"></use></svg>
                            Create task
                        </button>
                        <a href="dashboard.html" class="btn btn-outline-dark">Cancel</a>
                    </div>
                </form>
            </section>
        </main>
    </div>
    <script src="../../js/theme.js"></script>
    <script type="module" src="../../js/main.js"></script>
</body>
</html>
