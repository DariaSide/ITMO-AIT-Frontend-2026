<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Project | Prime</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/dashboard.css">
    <link rel="stylesheet" href="../../css/light.css" id="theme-style">
</head>

<body class="dashboard-page">
    <div class="d-flex">
        <aside class="sidebar p-3">
            <nav aria-label="Sidebar navigation">
                <h2 class="logo text-white mb-4">
                    <a href="dashboard.html" class="text-white text-decoration-none" aria-label="Prime dashboard homepage">
                        PRIME
                    </a>
                </h2>

                <ul class="nav flex-column">
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white" href="dashboard.html">
                            <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-dashboard"></use></svg>
                            Dashboard
                        </a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white" href="add_task.html">
                            <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-task"></use></svg>
                            Create new task
                        </a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white" href="create_project.html" aria-current="page">
                            <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-project"></use></svg>
                            Create new project
                        </a>
                    </li>
                    <li class="nav-item mt-4">
                        <a class="nav-link text-white" href="../default.html">
                            <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-logout"></use></svg>
                            Logout
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main id="main-content" class="main-content flex-grow-1 p-4">
            <div class="d-flex justify-content-end mb-3">
                <button id="theme-toggle" class="btn btn-outline-secondary" type="button">
                    <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-theme"></use></svg>
                    Theme
                </button>
            </div>

            <section aria-labelledby="create-project-title">
                <h1 id="create-project-title" class="mb-4">
                    <svg class="icon icon-lg nav-icon"><use href="/prime/images/sprite.svg#icon-project"></use></svg>
                    Create Project
                </h1>

                <form class="card p-4" aria-label="Create project form">
                    <div class="mb-3">
                        <label for="projectName" class="form-label">Project name</label>
                        <input id="projectName" name="projectName" class="form-control" type="text" required autocomplete="off">
                    </div>

                    <div class="mb-3">
                        <label for="projectDescription" class="form-label">Project description</label>
                        <textarea id="projectDescription" name="projectDescription" class="form-control" rows="4"></textarea>
                    </div>

                    <button id="createProjectBtn" class="btn btn-dark" type="button">
                        <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-plus"></use></svg>
                        Create project
                    </button>

                    <hr class="my-4">

                    <div class="mb-3">
                        <label for="inviteLink" class="form-label">Invite link</label>
                        <div class="input-group">
                            <input id="inviteLink" name="inviteLink" class="form-control" type="text" readonly aria-describedby="inviteHelp">
                            <button id="copyInviteBtn" class="btn btn-outline-dark" type="button">
                                <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-copy"></use></svg>
                                Copy
                            </button>
                        </div>
                        <div id="inviteHelp" class="form-text">
                            Copy this link to invite team members to the project.
                        </div>
                    </div>
                </form>
            </section>
        </main>
    </div>
    <script src="../../js/theme.js"></script>
    <script type="module" src="../../js/main.js"></script>
</body>
</html>
