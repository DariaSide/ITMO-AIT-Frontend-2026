<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime | Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/dashboard.css">
    <link rel="stylesheet" href="../../css/light.css" id="theme-style">
</head>

<body class="dashboard-page">
    <div class="d-flex">
        <aside class="sidebar p-3">
            <nav aria-label="Sidebar navigation">
                <h2 class="logo text-white mb-4">
                    <a href="dashboard.html" class="text-white text-decoration-none" aria-label="Prime dashboard homepage">
                        PRIME
                    </a>
                </h2>

                <ul class="nav flex-column">
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white" href="dashboard.html">
                            <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-dashboard"></use></svg>
                            Dashboard
                        </a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white" href="add_task.html">
                            <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-task"></use></svg>
                            Create new task
                        </a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white" href="create_project.html">
                            <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-project"></use></svg>
                            Create new project
                        </a>
                    </li>
                    <li class="nav-item mt-4">
                        <a class="nav-link text-white" href="../default.html">
                            <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-logout"></use></svg>
                            Logout
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main id="main-content" class="main-content flex-grow-1 p-4">
            <div class="d-flex justify-content-end mb-3">
                <button id="theme-toggle" class="btn btn-outline-secondary" type="button">
                    <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-theme"></use></svg>
                    Theme
                </button>
            </div>

            <section aria-labelledby="projectTitle">
                <h1 id="projectTitle" class="mb-4">
                    <svg class="icon icon-lg nav-icon"><use href="/prime/images/sprite.svg#icon-project"></use></svg>
                </h1>
                <p id="projectDescription" class="text-muted mb-4"></p>
            </section>

            <section aria-labelledby="team-heading">
                <h2 id="team-heading" class="mb-3">
                    <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-team"></use></svg>
                    Team
                </h2>
                <ul id="projectTeam" class="list-group mb-4" aria-label="Project team members"></ul>
            </section>

            <section aria-labelledby="tasks-heading">
                <h2 id="tasks-heading" class="mb-3">
                    <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-task"></use></svg>
                    Project Tasks
                </h2>

                <div class="card mb-4">
                    <div class="card-body">
                        <table class="table mb-0">
                            <caption class="visually-hidden">List of project tasks</caption>
                            <thead>
                                <tr>
                                    <th scope="col">Task</th>
                                    <th scope="col">Project</th>
                                    <th scope="col">Assignee</th>
                                    <th scope="col">Creator</th>
                                    <th scope="col">Status</th>
                                    <th scope="col">Due</th>
                                </tr>
                            </thead>
                            <tbody id="userTasks"></tbody>
                        </table>
                    </div>
                </div>

                <div class="mb-4">
                    <a href="add_task.html" class="btn btn-dark btn-sm">
                        <svg class="icon nav-icon"><use href="/prime/images/sprite.svg#icon-plus"></use></svg>
                        Add task
                    </a>
                </div>
            </section>
        </main>
    </div>
    <script src="../../js/theme.js"></script>
    <script type="module" src="../../js/main.js"></script>
</body>
</html>
